services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: taskqueue
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/taskqueue
      DATABASE_USERNAME: admin
      DATABASE_PASSWORD: admin

volumes:
  postgres_data:
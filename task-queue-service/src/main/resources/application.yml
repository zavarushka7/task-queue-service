spring:
  application:
    name: task-queue-service

  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

server:
  port: 8080

app:
  storage:
    base-path: /data/uploads
  queue:
    max-concurrent-tasks: 5
  processing:
    max-retry-attempts: 3
    stuck-timeout-minutes: 10
    stuck-check-interval-ms: 300000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  prometheus:
    metrics:
      export:
        enabled: true
databaseChangeLog:
  - changeSet:
      id: 1
      author: alena
      comment: Создание таблицы задач
      changes:
        - createTable:
            tableName: tasks
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: file_path
                  type: VARCHAR(1000)
                  constraints:
                    nullable: false
              - column:
                  name: original_file_name
                  type: VARCHAR(500)
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: INT
                  defaultValue: "0"
                  constraints:
                    nullable: false
              - column:
                  name: file_size
                  type: BIGINT
              - column:
                  name: mime_type
                  type: VARCHAR(200)
              - column:
                  name: result
                  type: TEXT
              - column:
                  name: error_message
                  type: TEXT
              - column:
                  name: retry_count
                  type: INT
                  defaultValue: "0"
                  constraints:
                    nullable: false
              - column:
                  name: processing_time_ms
                  type: BIGINT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: completed_at
                  type: TIMESTAMP WITH TIME ZONE
databaseChangeLog:
  - changeSet:
      id: 2
      author: alena
      comment: Создание таблицы истории событий задач
      changes:
        - createTable:
            tableName: task_events
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: task_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_task_events_task
                    references: tasks(id)
                    deleteCascade: true
              - column:
                  name: event_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: old_status
                  type: VARCHAR(20)
              - column:
                  name: new_status
                  type: VARCHAR(20)
              - column:
                  name: details
                  type: TEXT
              - column:
                  name: timestamp
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false